<ion-header mode="ios" class="ion-no-border">
  <ion-toolbar color="dark">
    <ion-title>Settings</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-card class="m-0 p-0 rounded-none" color="dark" mode="ios">
    <ion-item lines="none" detail="true" color="dark" (click)="openProfileModal()">
      <ion-label>
        <h1 style="font-size: 18px !important; text-transform: capitalize;">{{auth.currentUserValue.name}}</h1>
        <h1 style="font-size: 14px !important;">+91 {{auth.currentUserValue.mobile}}</h1>
      </ion-label>
    </ion-item>
  </ion-card>

  <ion-item detail="true" lines="full" (click)="openPrivacyModal()">
    <ion-label>
      Privacy Policy
    </ion-label>
  </ion-item>
  <ion-item detail="true" lines="full" (click)="openTermsModal()">
    <ion-label>
      Terms & Conditions
    </ion-label>
  </ion-item>
  <ion-item detail="true" lines="full" (click)="openRefundModal()">
    <ion-label>
      Refund Policy
    </ion-label>
  </ion-item>

  <ion-item lines="none" (click)="logout()">
    <ion-label color="primary" class="font-bold">
      Logout
    </ion-label>
  </ion-item>

</ion-content>
